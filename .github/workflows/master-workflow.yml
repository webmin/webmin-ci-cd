name: Master Workflow

on:
  workflow_call:
    inputs:
      build-type:
        required: true
        type: string
        description: 'Type of build: package or module'
      project-name:
        required: false
        type: string
        description: 'Name of the project to build (e.g. webmin, usermin, virtualmin-gpl; if not specified, the default is always webmin and usermin)'
      is-release:
        required: false
        type: boolean
        default: false
        description: 'Whether this is a release or just a testing build'
      is-prerelease:
        required: false
        type: boolean
        default: false
        description: 'Whether this is a final release or a pre-release build'
      is-checkout:
        description: 'Whether to checkout the code or not'
        required: false
        type: boolean
        default: false
      discard-build-checkout:
        description: 'Whether to remove the build job checkout before running build scripts'
        required: false
        type: boolean
        default: false
      run-code-review:
        description: 'Whether to review submitted code when an API key is available'
        required: false
        type: boolean
        default: true
      code-review-email:
        description: 'Whether to email code review findings when SMTP is configured'
        required: false
        type: boolean
        default: false
      code-review-email-on-attention:
        description: 'Whether email notifications should include non-blocking attention findings'
        required: false
        type: boolean
        default: true
      code-review-commit-comments:
        description: 'Whether to leave code review findings as comments on the pushed commit'
        required: false
        type: boolean
        default: true
      code-review-comments-on-attention:
        description: 'Whether commit comments should include non-blocking attention findings'
        required: false
        type: boolean
        default: true
      module-build-type:
        required: false
        type: string
        default: 'core'
        description: 'Build type for packages (e.g. full, core, minimal)'
      rebuild-all-modules:
        required: false
        type: boolean
        default: false
        description: 'Rebuild all product modules by skipping incremental build checks'
      legacy-rpm-names:
        required: false
        type: boolean
        default: false
        description: 'Whether to use old RPM prefixes like wbm-, wbt-, etc., in module package names'
    secrets:
      DEV_IP_ADDR:
        required: true
      DEV_IP_KNOWN_HOSTS:
        required: false
      DEV_UPLOAD_SSH_USER:
        required: true
      DEV_UPLOAD_SSH_DIR:
        required: true
      DEV_SSH_PRV_KEY:
        required: true
      PRERELEASE_UPLOAD_SSH_DIR:
        required: true
      ALL_GPG_PH2:
        required: true
      DEV_CHILD_GITHUB_TOKEN:
        required: false
      CODE_REVIEW_API_KEY:
        required: false
      CODE_REVIEW_SMTP_PASSWORD:
        required: false

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ !contains(github.event.head_commit.message || '', '[no-build]') && inputs.run-code-review && github.event_name == 'push' && !contains(toJson(github.event.commits.*.message), '[no-review]') && !contains(github.event.head_commit.message || '', '[no-review]') && (github.repository_owner == 'webmin' || github.repository_owner == 'virtualmin') }}
    env:
      CI_CD_UNSTABLE_BASE: https://raw.githubusercontent.com/webmin/webmin-ci-cd/main/build
    steps:
      - name: Check code review configuration
        id: review-config
        env:
          CODE_REVIEW_API_KEY: ${{ secrets.CODE_REVIEW_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${CODE_REVIEW_API_KEY:-}" ]; then
            echo "No CODE_REVIEW_API_KEY was provided; skipping code review."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: ${{ steps.review-config.outputs.enabled == 'true' }}
        uses: actions/checkout@v4
        with:
          path: actions-checkout
          fetch-depth: 0

      - name: Fetch code review
        if: ${{ steps.review-config.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          curl -fsSLo code-review.bash "${CI_CD_UNSTABLE_BASE}/code-review.bash"
          chmod +x code-review.bash

      - name: CI code review
        if: ${{ steps.review-config.outputs.enabled == 'true' }}
        env:
          CODE_REVIEW_API_KEY: ${{ secrets.CODE_REVIEW_API_KEY }}
          CODE_REVIEW_SMTP_PASSWORD: ${{ secrets.CODE_REVIEW_SMTP_PASSWORD }}
          CODE_REVIEW_EMAIL: ${{ inputs.code-review-email }}
          CODE_REVIEW_EMAIL_ON_ATTENTION: ${{ inputs.code-review-email-on-attention }}
          CODE_REVIEW_COMMIT_COMMENTS: ${{ inputs.code-review-commit-comments }}
          CODE_REVIEW_COMMENTS_ON_ATTENTION: ${{ inputs.code-review-comments-on-attention }}
          CODE_REVIEW_GITHUB_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.before || '' }}
          HEAD_SHA: ${{ github.sha }}
          BEFORE_SHA: ${{ github.event.before || '' }}
          # Used only when push metadata cannot provide a usable before SHA.
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || '' }}
        run: |
          set -euo pipefail
          bash code-review.bash actions-checkout

  build:
    runs-on: ubuntu-latest
    needs: code-review
    permissions:
      contents: read
    # Only allow canonical repositories under our owners to invoke builds
    if: ${{ always() && !contains(github.event.head_commit.message || '', '[no-build]') && (needs.code-review.result == 'success' || needs.code-review.result == 'skipped') && (github.repository_owner == 'webmin' || github.repository_owner == 'virtualmin') }}
    env:
      TZ: Europe/Nicosia
      CI_CD_STABLE_BASE: https://github.com/webmin/webmin-ci-cd/releases/latest/download
      CI_CD_UNSTABLE_BASE: https://raw.githubusercontent.com/webmin/webmin-ci-cd/main/build
    steps:
      - name: Checkout code
        if: ${{ inputs.is-checkout || github.event_name == 'push' }}
        uses: actions/checkout@v4
        with:
          path: actions-checkout
          fetch-depth: ${{ github.event_name == 'push' && '0' || '1' }}

      - name: Discard build checkout
        if: ${{ inputs.discard-build-checkout }}
        run: rm -rf -- "$GITHUB_WORKSPACE/actions-checkout"

      - name: Reject release demotion
        if: ${{ github.event_name == 'release' && github.event.action == 'prereleased' && github.event.release.published_at != github.event.release.updated_at }}
        run: |
          echo "::error::Release-to-pre-release transitions are not supported."
          exit 1

      - uses: awalsh128/cache-apt-pkgs-action@latest
        with: 
          packages: git tar gzip openssl curl openssh-client rpm perl libjson-pp-perl libdigest-sha-perl liblist-moreutils-perl libencode-detect-perl zstd
          version: 1.0

      - name: Fetch dependencies
        run: |
          set -euo pipefail
          if [ "${{ inputs.is-release }}" = "true" ] && [ "${{ inputs.is-prerelease }}" != "true" ]; then
            base="${CI_CD_STABLE_BASE}"
            echo "Using stable build scripts from: $base"
          else
            base="${CI_CD_UNSTABLE_BASE}"
            echo "Using unstable build scripts from: $base"
          fi
          echo "BUILD_BOOTSTRAP_URL=$base" >> "$GITHUB_ENV"
          curl -fsSLo bootstrap.bash "$base/bootstrap.bash"
          chmod +x bootstrap.bash

      - name: Set timezone
        run: sudo timedatectl set-timezone ${{ env.TZ }}

      - name: Build and upload
        env:
          CLOUD__BUILD_RUN_ATTEMPT: ${{ github.run_attempt }}
          CLOUD__IP_ADDR: ${{ secrets.DEV_IP_ADDR }}
          CLOUD__IP_KNOWN_HOSTS: ${{ secrets.DEV_IP_KNOWN_HOSTS }}
          CLOUD__UPLOAD_SSH_USER: ${{ secrets.DEV_UPLOAD_SSH_USER }}
          CLOUD__UPLOAD_SSH_DIR: ${{ inputs.is-release && secrets.PRERELEASE_UPLOAD_SSH_DIR || secrets.DEV_UPLOAD_SSH_DIR }}
          CLOUD__SSH_PRV_KEY: ${{ secrets.DEV_SSH_PRV_KEY }}
          CLOUD__GPG_PH2: ${{ secrets.ALL_GPG_PH2 }}
          CLOUD__GH_TOKEN: ${{ secrets.DEV_CHILD_GITHUB_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
        run: |-
          # Set build mode
          build_args=()
          if [ "${{ inputs.is-release }}" = "true" ]; then
              build_args=(--release)
              if [ "${{ inputs.is-prerelease }}" = "true" ]; then
                  build_args+=(--prerelease)
              fi
          else
              build_args=(--testing)
          fi

          # Set output mode
          [[ "$RUNNER_DEBUG" == "1" ]] && build_args+=(--verbose)

          # Build excluded modules if it is not a full build
          if [ "${{ inputs.module-build-type }}" != "full" ]; then
              build_args+=(--build-type="${{ inputs.module-build-type }}")
          fi

          # Add no commit check if enabled to re-build all non-core modules with
          # a new version
          should_force_rebuild=false
          [ "${{ inputs.rebuild-all-modules }}" = "true" ] && should_force_rebuild=true
          [ "${{ github.ref_type }}" = "tag" ] && should_force_rebuild=true
          [ "${{ inputs.is-release }}" = "true" ] && should_force_rebuild=true
          commit_msg_lc=${COMMIT_MESSAGE,,}
          if [[ -n "$commit_msg_lc" ]]; then
            [[ "$commit_msg_lc" == *"[rebuild-all-modules]"* ]] && should_force_rebuild=true
            [[ "$commit_msg_lc" == *"version bump"* ]] && should_force_rebuild=true
            [[ "$commit_msg_lc" =~ ^v?[0-9]+\.[0-9]+(\.[0-9]+)*$ ]] && should_force_rebuild=true
          fi
          [ "$should_force_rebuild" = "true" ] && build_args+=(--rebuild-all-modules)

          # Use legacy RPM names if enabled, otherwise use new
          [ "${{ inputs.legacy-rpm-names }}" = "false" ] && \
            build_args+=(--no-wbm-prefix)

          # Bootstrap to prepare the environment
          bash bootstrap.bash "${build_args[@]}"

          # Build the product
          if [ "${{ inputs.build-type }}" = "package" ]; then
            bash build-product-deb.bash ${{ inputs.project-name }} "${build_args[@]}"
            bash build-product-rpm.bash ${{ inputs.project-name }} "${build_args[@]}"
          # Build the module
          else
            bash build-module-deb.bash ${{ inputs.project-name }} "${build_args[@]}"
            bash build-module-rpm.bash ${{ inputs.project-name }} "${build_args[@]}"
          fi
